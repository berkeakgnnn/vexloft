  <path d="M128 100 L88 140 L190 260 L200 100 Z" fill="url(#vGrad)" opacity="0.7"/>
  <!-- Right wing tip — extends outward -->
  <path d="M384 100 L424 140 L322 260 L312 100 Z" fill="url(#vGrad)" opacity="0.7"/>
  <!-- Center overlap diamond -->
